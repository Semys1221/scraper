services:
  - type: web
    name: engine
    runtime: python
    repo: https://github.com/Semys1221/scraper
    branch: main
    buildCommand: pip install -r engine/requirements.txt
    startCommand: python main.py
    healthCheckPath: /
    plan: starter
    region: frankfurt
    envVars:
      - key: SUPABASE_URL
        value: https://rwaggfdqdnfyomvgnsne.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OUTSCRAPER_API_KEY
        sync: false
      - key: SMARTLEAD_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CALENDLY_URL
        sync: false
      - key: TESTIMONIAL_URL
        sync: false

  - type: web
    name: cleaner
    runtime: python
    repo: https://github.com/Semys1221/scraper
    branch: main
    buildCommand: pip install -r cleaner/requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    plan: starter
    region: frankfurt
    envVars:
      - key: SUPABASE_URL
        value: https://rwaggfdqdnfyomvgnsne.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OUTSCRAPER_API_KEY
        sync: false
      - key: SMARTLEAD_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
